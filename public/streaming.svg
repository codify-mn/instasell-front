<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" width="100%" height="100%">
    <defs>
        <linearGradient id="ig-grad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#f09433" />
            <stop offset="25%" stop-color="#e6683c" />
            <stop offset="50%" stop-color="#dc2743" />
            <stop offset="75%" stop-color="#cc2366" />
            <stop offset="100%" stop-color="#bc1888" />
        </linearGradient>

        <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0EA5E9" />
            <stop offset="100%" stop-color="#6366F1" />
        </linearGradient>

        <style>
            .streaming-line {
                stroke: url(#line-grad);
                stroke-width: 3;
                stroke-dasharray: 8, 8;
                fill: none;
                animation: stream 1s linear infinite;
            }

            @keyframes stream {
                to {
                    stroke-dashoffset: -16;
                }
            }
        </style>
    </defs>

    <!-- Streaming lines -->
    <path class="streaming-line" d="M 175 200 C 260 200, 290 125, 370 125" />
    <path class="streaming-line" d="M 175 200 C 260 200, 290 275, 370 275" />

    <!-- Phone (Instasell) -->
    <g transform="translate(70, 110)">
        <rect x="0" y="0" width="100" height="180" rx="16" fill="#222831" />
        <rect x="6" y="14" width="88" height="152" rx="8" fill="#EEEEEE" />
        <!-- Notch -->
        <rect x="32" y="4" width="36" height="6" rx="3" fill="#393E46" />
        <!-- Home indicator -->
        <rect x="34" y="172" width="32" height="4" rx="2" fill="#666" />

        <!-- LIVE badge -->
        <rect x="10" y="22" width="48" height="18" rx="4" fill="#E23E57" opacity="0.9" />
        <circle cx="20" cy="31" r="3" fill="#ffffff">
            <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite" />
        </circle>
        <text x="28" y="35" font-family="sans-serif" font-size="10" font-weight="bold" fill="#ffffff">LIVE</text>

        <!-- App name -->
        <text x="50" y="100" font-family="sans-serif" font-size="13" fill="#393E46" text-anchor="middle" font-weight="bold">Instasell</text>
    </g>

    <!-- Facebook -->
    <g transform="translate(370, 88)">
        <circle cx="38" cy="38" r="38" fill="#1877F2" />
        <path d="M 41.7 63.2 L 41.7 39.8 L 49.5 39.8 L 50.7 30.8 L 41.7 30.8 L 41.7 25.2 C 41.7 22.5 42.4 20.6 46.3 20.6 L 51 20.6 L 51 12.6 C 50.3 12.5 47.3 12.2 43.8 12.2 C 36.6 12.2 31.7 16.6 31.7 24.6 L 31.7 30.8 L 24 30.8 L 24 39.8 L 31.7 39.8 L 31.7 63.2 Z" fill="#ffffff" transform="translate(0.5, 0.5)" />
        <!-- Label -->
        <text x="38" y="90" font-family="sans-serif" font-size="12" fill="#666666" text-anchor="middle" font-weight="600">Facebook</text>
    </g>

    <!-- Instagram -->
    <g transform="translate(370, 238)">
        <rect x="0" y="0" width="76" height="76" rx="18" fill="url(#ig-grad)" />
        <rect x="14" y="14" width="48" height="48" rx="13" fill="none" stroke="#ffffff" stroke-width="4.5" />
        <circle cx="38" cy="38" r="12" fill="none" stroke="#ffffff" stroke-width="4.5" />
        <circle cx="54" cy="22" r="4" fill="#ffffff" />
        <!-- Label -->
        <text x="38" y="92" font-family="sans-serif" font-size="12" fill="#666666" text-anchor="middle" font-weight="600">Instagram</text>
    </g>
</svg>
